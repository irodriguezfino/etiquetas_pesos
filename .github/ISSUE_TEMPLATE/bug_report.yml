name: Bug report
description: Report a problem in Etiquetado Pesos
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: App version
      placeholder: "1.0.2"
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Remove private data before pasting logs.
